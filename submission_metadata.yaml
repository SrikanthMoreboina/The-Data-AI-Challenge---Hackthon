ai_usage_summary: |
  Used Gemini Antigravity for pipeline coding, math formulation, and refactoring.
  Used Claude for architecture review. No candidate data was sent to online APIs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Deterministic offline pipeline modeling a recruitment agency workspace. Uses streaming 
  ingestion and a Min-Heap select mechanism to maintain constant-bounded memory footprint 
  over 100,000 candidates. Features logical honeypot screening and non-linear scoring weight 
  multipliers (experience sweet spot, location-willingness, product vs services classification, 
  and exponential activity decay). Includes log-scaled skill endorsements and capped durations 
  to suppress popularity bias, plus pedigree bonuses and GitHub coding seniority offset.
  Runtime is under 10 seconds parallelized on a 12-core CPU.


